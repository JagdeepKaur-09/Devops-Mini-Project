version: '3.8'

services:

  # ── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: eventsnap-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eventsnap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── Backend (Node.js + Express) ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventsnap-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/eventsnapDB
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost
    depends_on:
      - mongo
      - redis

  # ── Frontend (Angular + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: eventsnap-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
